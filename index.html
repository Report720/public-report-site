<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিপোর্ট ওয়েব</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #ffffff; color: #333; }
        .top-bar { background: #007bff; color: white; padding: 10px; text-align: center; font-weight: bold; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid #eee; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .social-links { text-align: center; margin-top: 20px; padding: 20px; background: #f9f9f9; }
        .social-links a { font-size: 30px; margin: 0 15px; color: #555; text-decoration: none; }
        .fa-facebook { color: #1877f2; }
        .fa-x-twitter { color: #000; }
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        footer { text-align: center; padding: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-bar">রিপোর্ট ওয়েব</div>

    <nav class="navbar">
        <div style="font-weight: bold; font-size: 20px;">REPORT<span style="color: #007bff;">WEB</span></div>
        <div>
            <a href="#" style="text-decoration: none; color: #333; margin-left: 15px;">Home</a>
            <a href="#" style="text-decoration: none; color: #333; margin-left: 15px;">Report</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="text-align: center;">রিপোর্ট সাবমিট করুন</h2>
        <form action="https://formspree.io/f/আপনার_আইডি" method="POST" enctype="multipart/form-data">
            <input type="text" name="Name" placeholder="আপনার নাম" required>
            <input type="email" name="Email" placeholder="ইমেইল" required>
            <select name="Category">
                <option value="অভিযোগ">অভিযোগ</option>
                <option value="পরামর্শ">পরামর্শ</option>
            </select>
            <textarea name="Message" rows="4" placeholder="বিস্তারিত লিখুন" required></textarea>
            <input type="file" name="Attachment">
            <button type="submit" class="submit-btn">জমা দিন</button>https://formspree.io/f/mnjlowpp
        </form>
    </div>

    <div class="social-links">
        <p>আমাদের সাথে যুক্ত থাকুন:</p>
        <a href="https://facebook.com/yourprofile" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://twitter.com/yourprofile" target="_blank"><i class="fab fa-x-twitter"></i></a>
    </div>

    <a href="https://wa.me/8801700000000" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        © ২০২৬ রিপোর্ট ওয়েব | ধন্যবাদ
    </footer>

</body>
</html>
